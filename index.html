<div id="shell-game-wrapper">
    <div id="game-status">Runde 1 von 4</div>
    <div id="game-container">
        <div class="cup-slot" id="slot-0">
            <div class="cup" id="cup-0" onclick="chooseCup(0)"></div>
            <div class="item" id="item-0"></div>
        </div>
        <div class="cup-slot" id="slot-1">
            <div class="cup" id="cup-1" onclick="chooseCup(1)"></div>
            <div class="item" id="item-1"></div>
        </div>
        <div class="cup-slot" id="slot-2">
            <div class="cup" id="cup-2" onclick="chooseCup(2)"></div>
            <div class="item" id="item-2"></div>
        </div>
    </div>
    <div id="magic-title">Magic Mike präsentiert: Das Becherspiel</div>
    <button id="start-btn" onclick="handleStartButtonClick()">Spiel starten</button>
</div>

<style>
#shell-game-wrapper {
    background: #111;
    color: #fff;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    font-family: 'Arial', sans-serif;
    max-width: 600px;
    margin: 10px auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    height: auto; 
}
#game-status {
    font-size: 18px;
    margin-bottom: 15px;
    min-height: 25px;
    color: #ffd700;
}
#game-container {
    display: flex;
    justify-content: space-around;
    position: relative;
    height: 170px;
    margin-bottom: 5px;
}
.cup-slot {
    position: absolute;
    width: 100px;
    height: 160px;
    transition: left 0.4s ease-in-out;
}
#slot-0 { left: 5%; }
#slot-1 { left: 38%; }
#slot-2 { left: 70%; }

.cup {
    width: 85px;
    height: 110px;
    background: linear-gradient(135deg, #e6e6e6 0%, #ffffff 30%, #999999 70%, #cccccc 100%);
    border-radius: 35px 35px 10px 10px;
    clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
    position: absolute;
    top: 0;
    left: 7px;
    z-index: 2;
    cursor: pointer;
    transition: transform 0.5s ease;
    box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2);
}
.cup::after {
    content: '';
    position: absolute;
    top: 0;
    left: 15%;
    width: 70%;
    height: 10px;
    background: #999;
    border-radius: 50%;
}
.cup.lifted {
    transform: translateY(-60px);
}
.item {
    position: absolute;
    bottom: 15px;
    left: 32px;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.3s ease;
}
.item.ball {
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #990000);
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
}
.item.lemon {
    background: radial-gradient(circle at 30% 30%, #fff700, #b3a700);
    border-radius: 50% 60% 50% 60%;
    transform: rotate(45deg);
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
}
.item.visible {
    opacity: 1;
}
#magic-title {
    color: #ff4d4d;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 10px;
    min-height: 22px;
}
#start-btn {
    background: linear-gradient(135deg, #ffd700, #d4af37);
    color: #111;
    border: none;
    padding: 10px 25px;
    font-size: 15px;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
    box-shadow: 0 4px 15px rgba(212,175,55,0.4);
    margin-top: 5px;
}
#start-btn:hover {
    transform: scale(1.05);
}
#start-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}
</style>

<script>
let currentRound = 1;
let ballSlot = 1; 
let isShuffling = false;
let gameActive = false;
let positions =;
let shuffleCount = 0;
const maxShuffles = 7;
let isFirstRoundOfGame = true; 
let soundPlayedThisStep = false;

// =========================================================================
// WICHTIG: FÜGE HIER DEN KOPIERTEN DOWNLOAD-LINK VON JIMDO EIN
// =========================================================================
const shuffleSound = new Audio('<span style="color:red; font-weight:bold;"> https://www.magic-mike-world.de/app/download/17052436824/BEcher++Sound+Schieben.mp3?t=1779711747 </span>'); 
// =========================================================================
shuffleSound.volume = 0.5;

function initRound() {
    isShuffling = false;
    gameActive = false;
    document.getElementById('start-btn').disabled = false;
    
    for(let i=0; i<3; i++) {
        document.getElementById(`cup-${i}`).classList.remove('lifted');
        document.getElementById(`item-${i}`).className = 'item';
    }
    
    if (!isFirstRoundOfGame) {
        setTimeout(() => {
            const initialItem = document.getElementById(`item-${ballSlot}`);
            initialItem.classList.add('ball', 'visible');
            document.getElementById('game-status').innerText = `Runde ${currentRound} von 4: Merk dir den Ball!`;
        }, 600);
    } else {
        document.getElementById('game-status').innerText = `Runde ${currentRound} von 4`;
    }
}

function handleStartButtonClick() {
    // Schaltet die Audiodatei direkt beim Klick frei
    shuffleSound.play().then(() => {
        shuffleSound.pause();
        shuffleSound.currentTime = 0;
    }).catch(err => console.log("Audio bereitgestellt", err));

    if (isFirstRoundOfGame) {
        startIntro();
    } else {
        startGame();
    }
}

function startIntro() {
    document.getElementById('start-btn').disabled = true;
    document.getElementById('magic-title').style.display = 'none';
    document.getElementById('game-status').innerText = "Konzentration...";
    
    setTimeout(() => {
        const initialItem = document.getElementById(`item-${ballSlot}`);
        initialItem.classList.add('ball', 'visible');
        document.getElementById('game-status').innerText = `Runde ${currentRound} von 4: Merk dir den Ball!`;
        
        setTimeout(() => {
            isFirstRoundOfGame = false; 
            startGame();
        }, 2000);
        
    }, 2000);
}

function startGame() {
    document.getElementById('start-btn').disabled = true;
    document.getElementById('game-status').innerText = "Konzentration...";
    
    for(let i=0; i<3; i++) {
        document.getElementById(`item-${i}`).classList.remove('visible');
    }
    
    setTimeout(() => {
        isShuffling = true;
        shuffleCount = 0;
        doShuffle();
    }, 800);
}

function doShuffle() {
    if (shuffleCount >= maxShuffles) {
        isShuffling = false;
        gameActive = true;
        document.getElementById('game-status').innerText = "Wo ist der Ball? Klicke auf einen Becher!";
        return;
    }
    
    soundPlayedThisStep = false;
    
    let idx1 = Math.floor(Math.random() * 3);
    let idx2 = Math.floor(Math.random() * 3);
    while (idx1 === idx2) {
        idx2 = Math.floor(Math.random() * 3);
    }
    
    let temp = positions[idx1];
    positions[idx1] = positions[idx2];
    positions[idx2] = temp;
    
    updateDOMPositions();
    
    shuffleCount++;
    setTimeout(doShuffle, 400);
}

function updateDOMPositions() {
    const slotLefts = ["5%", "38%", "70%"];
    for(let i=0; i<3; i++) {
        let currentSlotIdx = positions.indexOf(i);
        document.getElementById(`slot-${i}`).style.left = slotLefts[currentSlotIdx];
    }
}

function chooseCup(cupId) {
    if (!gameActive || isShuffling) return;
    gameActive = false;
    
    let clickedSlot = positions.indexOf(cupId); 
    
    if (currentRound === 4) {
        for(let i=0; i<3; i++) {
            const item = document.getElementById(`item-${i}`);
            item.className = 'item lemon visible';
            document.getElementById(`cup-${i}`).classList.add('lifted');
        }
        document.getElementById('game-status').innerText = "Simsalabim! Der Ball ist weg... dafür gibt es Zitronen! 🍋";
        
        setTimeout(() => {
            for(let i=0; i<3; i++) {
                document.getElementById(`cup-${i}`).classList.remove('lifted');
            }
            const startBtn = document.getElementById('start-btn');
            startBtn.innerText = "Nochmal spielen";
            startBtn.disabled = false;
            
            startBtn.onclick = function() {
                currentRound = 1;
                positions =;
                ballSlot = Math.floor(Math.random() * 3);
                isFirstRoundOfGame = true; 
                
                startBtn.innerText = "Spiel starten";
                startBtn.onclick = handleStartButtonClick;
                
                document.getElementById('magic-title').style.display = 'block';
                initRound();
            };
        }, 3000);
        
        return;
    }
    
    for(let i=0; i<3; i++) {
        document.getElementById(`cup-${i}`).classList.add('lifted');
    }
    
    let actualBallSlot = positions.indexOf(ballSlot);
    const ballItem = document.getElementById(`item-${ballSlot}`);
    ballItem.classList.add('ball', 'visible');
    
    if (clickedSlot === actualBallSlot) {
        document.getElementById('game-status').innerText = "Richtig! Gut aufgepasst!";
    } else {
        document.getElementById('game-status').innerText = "Knapp davor! Der Ball war unter einem anderen Becher.";
    }
    
    currentRound++;
    document.getElementById('start-btn').innerText = `Runde ${currentRound} starten`;
    
    setTimeout(() => {
        ballSlot = Math.floor(Math.random() * 3);
        initRound();
    }, 3000);
}

window.onload = function() {
    initRound();
    
    for (let i = 0; i < 3; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.addEventListener('transitionstart', (e) => {
            if (isShuffling && e.propertyName === 'left' && !soundPlayedThisStep) {
                soundPlayedThisStep = true;
                shuffleSound.currentTime = 0;
                shuffleSound.play().catch(err => console.log("Audio verzögert:", err));
            }
        });
    }
};
</script>
